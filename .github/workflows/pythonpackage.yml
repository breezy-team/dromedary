---
name: Python package

"on": [push, pull_request]

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    # Windows has a number of pre-existing test failures unrelated to the
    # macOS/Windows wheel build fixes (urlutils path handling, FakeNFS
    # rename semantics, etc.). Run the suite there for visibility but do
    # not gate on it until those are addressed.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U "setuptools>=60" setuptools-rust
          if [[ "${{ matrix.python-version }}" == "3.14"* ]]; then
            python -m pip install -e ".[dev,testing]"
          else
            python -m pip install -e ".[dev,testing,paramiko]"
          fi
      - name: Run ruff
        if: matrix.os == 'ubuntu-latest'
        run: |
          ruff check .
          ruff format --check .
      - name: Run mypy
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install mypy types-paramiko typing-extensions
          python -m mypy dromedary
        continue-on-error: true
      - name: Test suite
        run: |
          python -m unittest discover -s dromedary/tests -t .
        env:
          PYTHONHASHSEED: random
      - name: Rust tests
        run: |
          cargo test --manifest-path Cargo.toml

  build-gio:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install GIO system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev pkg-config
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U "setuptools>=60" setuptools-rust
          DROMEDARY_GIO=1 python -m pip install -e ".[dev,testing,paramiko]"
      - name: Rust tests (gio feature)
        run: |
          cargo test --manifest-path Cargo.toml --features gio
      - name: Python test suite (gio enabled)
        run: |
          python -m unittest discover -s dromedary/tests -t .
        env:
          PYTHONHASHSEED: random
